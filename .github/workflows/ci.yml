name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install --no-build-isolation -e .
      - name: Test
        run: python -m unittest discover -s tests -v

  hotpotqa-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install --no-build-isolation -e .
      - name: HotpotQA tiny smoke
        run: python scripts/run_hotpotqa_benchmark.py
