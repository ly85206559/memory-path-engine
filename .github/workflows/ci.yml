name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"
      - name: Install
        run: python -m pip install --no-build-isolation -e .
      - name: Test
        run: python -m unittest discover -s tests -v

  hotpotqa-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"
      - name: Install
        run: python -m pip install --no-build-isolation -e .
      - name: HotpotQA tiny sanity
        run: python scripts/run_hotpotqa_benchmark.py
