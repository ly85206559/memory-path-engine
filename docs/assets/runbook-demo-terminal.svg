    <tspan x="16" dy="14">  BEST ANSWER</tspan>
    <tspan x="16" dy="14">    If rollback does not recover service, restart the worker service</tspan>
    <tspan x="16" dy="14">    and confirm queue drain behavior. | If the latest deployment is</tspan>
    <tspan x="16" dy="14">    implicated, roll back the release and verify latency recovery. |</tspan>
    <tspan x="16" dy="14">    When p95 latency exceeds the alert threshold, notify the</tspan>
    <tspan x="16" dy="14">    incident commander and open an incident channel.</tspan>
    <tspan x="16" dy="14">    [latency_ms=3.04]</tspan>
